name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o smartthings-pc-control.exe .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: smartthings-pc-control.exe
          generate_release_notes: true
